<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060609" />
  <title>Além da Genética</title>
  <meta name="description" content="Plano de treino semanal com técnicas avançadas de hipertrofia." />
  <link rel="icon" type="image/x-icon" href="img/fav.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="bg"></div>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span class="eyebrow-text">Metodologia Avançada</span>
      </div>

      <h1 class="h-title">
        <span class="t-red">Além da</span><br>Genética
      </h1>

      <p class="h-desc">Plano semanal de hipertrofia com rest-pause, drop set e pico de contração.</p>

      <div class="pg-row">
        <div class="pg-track">
          <div class="pg-fill" id="pFill"></div>
        </div>
        <span class="pg-pct" id="pText">0%</span>
      </div>

      <div class="stats">
        <div class="stat"><span class="stat-n cr">5</span><span class="stat-l">Treinos</span></div>
        <div class="stat"><span class="stat-n cg">36</span><span class="stat-l">Exercícios</span></div>
        <div class="stat"><span class="stat-n ce" id="sDone">0</span><span class="stat-l">Feitos</span></div>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <main id="content"></main>

    <footer class="footer">
      <i class="ph-fill ph-check-circle"></i>
      Progresso salvo automaticamente
    </footer>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal-bg">
    <div class="modal-card">
      <div class="modal-icon"><i class="ph-fill ph-warning"></i></div>
      <h2 class="modal-title">Confirmar</h2>
      <p id="mMsg" class="modal-msg"></p>
      <div class="modal-btns">
        <button id="mNo" class="modal-btn btn-cancel">Cancelar</button>
        <button id="mYes" class="modal-btn btn-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    const SK = 'adg-v12';

    /* ---- icons for each day ---- */
    const dayIcons = {
      'Treino A': 'ph-fill ph-barbell',
      'Treino B': 'ph-fill ph-person-arms-spread',
      'Treino C': 'ph-fill ph-sneaker-move',
      'Treino D': 'ph-fill ph-barbell',
      'Treino E': 'ph-fill ph-hand-fist',
      'Descanso': 'ph-fill ph-moon-stars'
    };

    const D = [
      {
        id: 'semana', title: 'Semana', type: 'week', days: [
          { d: 'Seg', plan: 'Treino A', sub: 'Peito · Ombro · Tríceps' },
          { d: 'Ter', plan: 'Treino B', sub: 'Costas · Bíceps' },
          { d: 'Qua', plan: 'Treino C', sub: 'Membros Inferiores' },
          { d: 'Qui', plan: 'Descanso', sub: 'Recuperação ativa' },
          { d: 'Sex', plan: 'Treino D', sub: 'Ombros · Peito · Tríceps' },
          { d: 'Sáb', plan: 'Treino E', sub: 'Bíceps · Costas · Abd' },
          { d: 'Dom', plan: 'Descanso', sub: 'Repouso total' }
        ]
      },
      {
        id: 'treino-a', title: 'Treino A', sub: 'Peito, Ombros e Tríceps',
        alert: 'Mobilidade de ombros antes de começar',
        ex: [
          { id: 'a1', n: 'Supino Inclinado c/ Halteres ou Máquina', t: null, s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'a2', n: 'Supino Reto c/ Halteres ou Máquina', t: '2 rest-pause de 10s na última série', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'a3', n: 'Supino Declinado — Barra ou Máquina', t: null, s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2 min)' }] },
          { id: 'a4', n: 'Voador', t: '2s pico de contração + 1 dropset', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 10–15 (1 min)' }] },
          { id: 'a5', n: 'Elevação Frontal', t: null, s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2 min)' }] },
          { id: 'a6', n: 'Elevação Lateral Sentado c/ Halteres', t: '1 drop set', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1 min)' }, { l: 'Trabalho', d: '2 × 8–12 (1 min)' }] },
          { id: 'a7', n: 'Tríceps Francês na Corda', t: null, s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 6–10 (2 min)' }] }
        ]
      },
      {
        id: 'treino-b', title: 'Treino B', sub: 'Costas e Bíceps',
        alert: 'Mobilidade de ombros + alongamento do peito',
        ex: [
          { id: 'b1', n: 'Remada Curvada com Barra', t: '2s pico de contração', s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'b2', n: 'Remada Baixa Triângulo', t: '2s pico + 2 rest-pause', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'b3', n: 'Remada Baixa Pegada Aberta / Máquina', t: '2s pico', s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2 min)' }] },
          { id: 'b4', n: 'Pulley Frente Triângulo', t: '2s pico + 1 drop', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 8–12 (2 min)' }] },
          { id: 'b5', n: 'Meio Terra', t: null, s: [{ l: 'Aquecimento', d: '1 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'b6', n: 'Hiperextensão no Banco Romano', t: null, s: [{ l: 'Trabalho', d: '3 × 10–15 (90s)' }] },
          { id: 'b7', n: 'Rosca Scott Máquina', t: '2s pico de contração', s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 6–10 (2 min)' }] }
        ]
      },
      {
        id: 'treino-c', title: 'Treino C', sub: 'Membros Inferiores',
        alert: 'Mobilidade: posteriores, glúteos, quadríceps e ílio-psoas',
        ex: [
          { id: 'c1', n: 'Agachamento Livre', t: null, s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'c2', n: 'Leg 45°', t: '2 rest-pause', s: [{ l: 'Ajuste', d: '1 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 8–12 (2–3 min)' }] },
          { id: 'c3', n: 'Extensor', t: '2s pico', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 10–15 (1 min)' }] },
          { id: 'c4', n: 'Flexor Deitado', t: '2s pico', s: [{ l: 'Aquecimento', d: '1 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'c5', n: 'Stiff', t: null, s: [{ l: 'Aquecimento', d: '1 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 8–10 (2–3 min)' }] },
          { id: 'c6', n: 'Elevação de Quadril', t: '2s pico + 1 drop', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'c7', n: 'Panturrilha em Pé (máquina ou smith)', t: '2s pico', s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 10–15 (2 min)' }] }
        ]
      },
      {
        id: 'treino-d', title: 'Treino D', sub: 'Ombros, Peito e Tríceps',
        alert: 'Mobilidade e alongamento de ombros e tríceps',
        ex: [
          { id: 'd1', n: 'Desenvolvimento com Halteres', t: null, s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'd2', n: 'Elevação Frontal', t: '2 rest-pause', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1 min)' }, { l: 'Trabalho', d: '2 × 10–15 (1 min)' }] },
          { id: 'd3', n: 'Elevação Lateral Sentado c/ Halteres', t: null, s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1 min)' }, { l: 'Trabalho', d: '2 × 8–12 (1 min)' }] },
          { id: 'd4', n: 'Elevação Lateral Máquina ou Unilateral no Cabo', t: '1 drop set', s: [{ l: 'Ajuste', d: '1 × 4–6 (1 min)' }, { l: 'Trabalho', d: '2 × 8–12 (1 min)' }] },
          { id: 'd5', n: 'Voador', t: '2s pico', s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 6–10 (2–3 min)' }] },
          { id: 'd6', n: 'Tríceps Corda', t: '2s pico', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 6–10 (2 min)' }] },
          { id: 'd7', n: 'Tríceps Testa Corda Banco 35°', t: '2 rest-pause', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 8–12 (2 min)' }] }
        ]
      },
      {
        id: 'treino-e', title: 'Treino E', sub: 'Bíceps, Costas e Abdômen',
        alert: 'Mobilidade de ombros + alongamento do peito',
        ex: [
          { id: 'e1', n: 'Rosca Direta Cabo', t: '2s pico', s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2–3 min)' }] },
          { id: 'e2', n: 'Rosca Scott Máquina ou no Cabo', t: '2s pico + 2 rest-pause', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 8–12 (2 min)' }] },
          { id: 'e3', n: 'Rosca Direta Corda', t: '1 drop set', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 10–15 (1 min)' }] },
          { id: 'e4', n: 'Pulley Frente Aberto', t: '2s pico', s: [{ l: 'Aquecimento', d: '1–2 × 10–15 (1 min)' }, { l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 8–12 (2 min)' }] },
          { id: 'e5', n: 'Pulley Frente Triângulo', t: '2s pico + 1 drop', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '3 × 8–12 (2 min)' }] },
          { id: 'e6', n: 'Serrote', t: '2s pico', s: [{ l: 'Ajuste', d: '1–2 × 4–6 (1–2 min)' }, { l: 'Trabalho', d: '2 × 6–10 (2 min)' }] },
          { id: 'e7', n: 'Abdominal Infra na Torre', t: '2s pico', s: [{ l: 'Trabalho', d: '3 × RM (1 min)' }] },
          { id: 'e8', n: 'Abdominal Supra na Prancha Declinada', t: null, s: [{ l: 'Trabalho', d: '3 × RM (1 min)' }] }
        ]
      }
    ];

    /* ============================================ STATE ============================================ */
    const $t = document.getElementById('tabs'), $m = document.getElementById('content'), $md = document.getElementById('modal');
    let act = 'semana', st = ld(), mCb = null;

    document.getElementById('mNo').onclick = () => { $md.classList.remove('open'); mCb = null };
    document.getElementById('mYes').onclick = () => { $md.classList.remove('open'); if (mCb) { mCb(); mCb = null } };
    $md.onclick = e => { if (e.target === $md) { $md.classList.remove('open'); mCb = null } };
    function ask(msg, cb) { document.getElementById('mMsg').textContent = msg; mCb = cb; $md.classList.add('open') }

    function ld() { try { return JSON.parse(localStorage.getItem(SK)) || {} } catch { return {} } }
    function sv() { try { localStorage.setItem(SK, JSON.stringify(st)) } catch { } }
    function k(a, b, c) { return a + '|' + b + '|' + c }
    function gc(a, b, c) { return !!st[k(a, b, c)] }
    function sc(a, b, c, v) { st[k(a, b, c)] = v }
    function ed(tid, eid, len) { for (let i = 0; i < len; i++)if (!gc(tid, eid, i)) return false; return len > 0 }
    function wd(tid) { return !!st[tid + '_d'] }
    function swd(tid, v) { st[tid + '_d'] = v }

    function tags(t) {
      if (!t) return [];
      const r = [], lo = t.toLowerCase();
      if (lo.includes('rest')) { const m = t.match(/(\d+)\s*rest/i); r.push({ txt: (m ? m[1] + ' ' : '') + 'Rest-Pause', cls: 'tag-rest' }) }
      if (lo.includes('drop')) { const m = t.match(/(\d+)\s*drop/i); r.push({ txt: (m ? m[1] + ' ' : '') + 'Drop Set', cls: 'tag-drop' }) }
      if (lo.includes('pico')) { const m = t.match(/(\d+)s/i); r.push({ txt: (m ? m[1] + 's ' : '') + 'Pico', cls: 'tag-pico' }) }
      return r;
    }

    function prog() {
      let t = 0, d = 0, exd = 0;
      D.forEach(tab => {
        if (!tab.ex) return; tab.ex.forEach(e => {
          e.s.forEach((_, i) => { t++; if (gc(tab.id, e.id, i)) d++ });
          if (ed(tab.id, e.id, e.s.length)) exd++;
        })
      });
      return { pct: t > 0 ? Math.round(d / t * 100) : 0, exd };
    }
    function uprog() {
      const { pct, exd } = prog();
      const f = document.getElementById('pFill'), t = document.getElementById('pText'), s = document.getElementById('sDone');
      if (f) f.style.width = pct + '%'; if (t) t.textContent = pct + '%'; if (s) s.textContent = exd;
    }
    function wid(plan) {
      const p = plan.toLowerCase();
      if (p.includes('treino a')) return 'treino-a'; if (p.includes('treino b')) return 'treino-b';
      if (p.includes('treino c')) return 'treino-c'; if (p.includes('treino d')) return 'treino-d';
      if (p.includes('treino e')) return 'treino-e'; return null;
    }

    /* ============================================ RENDER ============================================ */
    function renderTabs() {
      $t.innerHTML = '';
      D.forEach(tab => {
        const b = document.createElement('button');
        b.className = 'tab' + (tab.id === act ? ' active' : '');
        b.textContent = tab.title;
        b.onclick = () => { act = tab.id; renderTabs(); render() };
        $t.appendChild(b);
      });
      const tr = document.createElement('button');
      tr.className = 'tab tab-trash';
      tr.innerHTML = '<i class="ph ph-trash"></i>';
      tr.title = 'Zerar tudo';
      tr.onclick = () => ask('Zerar TODO o progresso? Não pode ser desfeito.', () => { st = {}; sv(); render(); uprog() });
      $t.appendChild(tr);
    }

    function render() {
      const tab = D.find(t => t.id === act);
      $m.innerHTML = '';
      if (!tab) return;
      tab.type === 'week' ? rWeek(tab) : rWork(tab);
      uprog();
    }

    /* ============================================ WEEK ============================================ */
    function rWeek(tab) {
      const p = document.createElement('div'); p.className = 'panel';

      const hd = document.createElement('div'); hd.className = 'week-head';
      hd.innerHTML = '<h2 class="week-title">Plano da Semana</h2>';
      p.appendChild(hd);

      const g = document.createElement('div'); g.className = 'week-grid';

      tab.days.forEach(d => {
        const rest = d.plan.toLowerCase().includes('descanso');
        const wi = wid(d.plan);
        let isDone = false;
        if (wi) { const w = D.find(t => t.id === wi); if (w && w.ex) isDone = w.ex.every(e => ed(wi, e.id, e.s.length)) }

        const card = document.createElement('div');
        card.className = 'day-card' + (rest ? ' rest' : '') + (isDone ? ' done' : '');

        const badge = wi && !rest ? `<span class="day-badge">${d.plan.split(' ')[1]}</span>` : '';
        const iconCls = dayIcons[d.plan] || 'ph-fill ph-dumbbell';
        const iconContent = isDone ? '✓' : `<i class="${iconCls}"></i>`;

        card.innerHTML = `
      <div class="day-top">
        <span class="day-label">${d.d}</span>
        ${badge}
      </div>
      <div class="day-plan">${d.plan}</div>
      <div class="day-sub">${d.sub}</div>
      <div class="day-icon">${iconContent}</div>
    `;
        g.appendChild(card);
      });
      p.appendChild(g);

      /* Legend */
      const lg = document.createElement('div'); lg.className = 'legend';
      lg.innerHTML = `
    <p class="legend-t">Técnicas Aplicadas</p>
    <div class="legend-list">
      <div class="legend-item"><span class="legend-dot lr"></span><strong>Rest-Pause</strong>10s de pausa na falha muscular</div>
      <div class="legend-item"><span class="legend-dot lp"></span><strong>Drop Set</strong>Redução de carga sem descanso</div>
      <div class="legend-item"><span class="legend-dot lc"></span><strong>Pico</strong>2s de squeeze na máxima tensão</div>
    </div>
  `;
      p.appendChild(lg);
      $m.appendChild(p);
    }

    /* ============================================ WORKOUT ============================================ */
    function rWork(tab) {
      const p = document.createElement('div'); p.className = 'panel';

      const hd = document.createElement('div'); hd.className = 'wo-head';
      const ttl = document.createElement('h2'); ttl.className = 'wo-title';
      ttl.innerHTML = tab.title + ` <span style="color:var(--text-3);font-weight:500;font-size:.85rem">· ${tab.sub}</span>`;
      hd.appendChild(ttl);

      if (tab.alert) {
        const al = document.createElement('div'); al.className = 'alert';
        al.innerHTML = `<i class="ph-fill ph-lightning"></i><span>${tab.alert}</span>`;
        hd.appendChild(al);
      }

      const isDone = wd(tab.id);
      const cBtn = document.createElement('button'); cBtn.className = 'btn-complete' + (isDone ? ' done' : '');
      cBtn.innerHTML = isDone ? '<i class="ph-fill ph-check-circle"></i> Treino concluído!' : '<i class="ph ph-check-circle"></i> Marcar como concluído';
      cBtn.onclick = () => {
        const v = !wd(tab.id);
        tab.ex.forEach(e => e.s.forEach((_, i) => sc(tab.id, e.id, i, v)));
        swd(tab.id, v); sv(); render();
      };
      hd.appendChild(cBtn);
      p.appendChild(hd);

      const list = document.createElement('div'); list.className = 'ex-list';
      tab.ex.forEach((e, idx) => list.appendChild(buildCard(tab, e, idx + 1, cBtn)));
      p.appendChild(list);

      const rw = document.createElement('div'); rw.className = 'reset-wrap';
      const rb = document.createElement('button'); rb.className = 'btn-reset';
      rb.innerHTML = '<i class="ph ph-arrow-counter-clockwise"></i> Zerar treino';
      rb.onclick = () => ask('Zerar o progresso deste treino?', () => {
        tab.ex.forEach(e => e.s.forEach((_, i) => sc(tab.id, e.id, i, false)));
        swd(tab.id, false); sv(); render();
      });
      rw.appendChild(rb); p.appendChild(rw);
      $m.appendChild(p);
    }

    /* ============================================ CARD ============================================ */
    function buildCard(tab, e, num, cBtn) {
      let doneCount = 0;
      e.s.forEach((_, i) => { if (gc(tab.id, e.id, i)) doneCount++; });
      const done = doneCount === e.s.length && e.s.length > 0;
      const partial = doneCount > 0 && !done;

      const card = document.createElement('div');
      card.className = 'ex-card' + (done ? ' done' : (partial ? ' partial' : ''));

      const tgs = tags(e.t);
      const tgsH = tgs.length ? `<div class="tags">${tgs.map(t => `<span class="tag ${t.cls}">${t.txt}</span>`).join('')}</div>` : '';

      const db = document.createElement('button'); db.className = 'btn-done' + (done ? ' on' : '');
      db.textContent = done ? '✓ Feito' : 'Concluir';
      db.onclick = () => {
        const now = !ed(tab.id, e.id, e.s.length);
        e.s.forEach((_, i) => sc(tab.id, e.id, i, now)); sv();
        card.querySelectorAll('.cb').forEach(c => { c.checked = now });
        card.classList.remove('done', 'partial');
        if (now) card.classList.add('done');
        db.className = 'btn-done' + (now ? ' on' : '');
        db.textContent = now ? '✓ Feito' : 'Concluir';
        syncWk(tab, cBtn); uprog();
      };

      const top = document.createElement('div'); top.className = 'ex-top';
      const info = document.createElement('div'); info.className = 'ex-info';
      info.innerHTML = `<div class="ex-num">Exercício ${String(num).padStart(2, '0')}</div><div class="ex-name">${e.n}</div>${tgsH}`;
      top.appendChild(info); top.appendChild(db); card.appendChild(top);

      const sw = document.createElement('div'); sw.className = 'sets';
      e.s.forEach((s, i) => {
        const row = document.createElement('div'); row.className = 'set-row';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'cb';
        cb.checked = gc(tab.id, e.id, i); cb.setAttribute('aria-label', s.l);
        cb.onchange = () => {
          sc(tab.id, e.id, i, cb.checked); sv();
          const cbs = Array.from(card.querySelectorAll('.cb'));
          const count = cbs.filter(c => c.checked).length;
          const all = count === cbs.length;
          const isPartial = count > 0 && !all;

          card.classList.toggle('done', all);
          card.classList.toggle('partial', isPartial);

          db.className = 'btn-done' + (all ? ' on' : '');
          db.textContent = all ? '✓ Feito' : 'Concluir';
          syncWk(tab, cBtn); uprog();
        };
        const lbl = document.createElement('span'); lbl.className = 'set-lbl'; lbl.textContent = s.l;
        const det = document.createElement('span'); det.className = 'set-detail'; det.textContent = s.d;
        row.appendChild(cb); row.appendChild(lbl); row.appendChild(det); sw.appendChild(row);
      });
      card.appendChild(sw); return card;
    }

    function syncWk(tab, btn) {
      if (!btn) return;
      const all = tab.ex.every(e => ed(tab.id, e.id, e.s.length));
      const was = wd(tab.id);
      if (all && !was) { swd(tab.id, true); btn.classList.add('done'); btn.innerHTML = '<i class="ph-fill ph-check-circle"></i> Treino concluído!'; sv() }
      if (!all && was) { swd(tab.id, false); btn.classList.remove('done'); btn.innerHTML = '<i class="ph ph-check-circle"></i> Marcar como concluído'; sv() }
    }

    renderTabs(); render(); uprog();
  </script>
</body>
